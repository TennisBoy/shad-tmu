name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Azure Static Web Apps
    env:
      TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if the Azure token isn't set yet
        if: env.TOKEN == ''
        run: echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set — skipping deploy. Add the secret to enable it."

      - name: Deploy to Azure Static Web Apps
        if: env.TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: ""
          skip_app_build: true
